<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wasatch Front Commuter Patterns</title>
  <meta name="description" content="Explore commute flow patterns across the Wasatch Front region using LEHD Census data." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺</text></svg>" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css" />
</head>
<body>
  <header class="app-header">
    <a href="https://wfrc.org/" target="_blank" rel="noopener" class="header-logo-link">
      <img src="/assets/wfrc-logo.png" alt="WFRC" class="header-logo" onerror="this.style.display='none'" />
    </a>
    <div class="header-titles">
      <h1>Wasatch Front Commuter Patterns</h1>
      <span class="header-subtitle">Census LEHD &middot; <span id="data-year"></span></span>
    </div>
    <div class="year-select-wrap" title="Data year">
      <select id="year-select" class="year-select" aria-label="Data year"></select>
    </div>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <div class="app-body">
    <!-- Left panel: inputs + stats -->
    <aside class="left-panel" id="left-panel">
      <div class="sidebar-loading">
        <div class="spinner"></div>
        <p>Loading data&hellip;</p>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="load-progress"></div>
        </div>
      </div>
    </aside>

    <!-- Center: map with floating toolbar -->
    <main class="map-container">
      <div class="map-toolbar" id="map-toolbar">
        <button class="tb-btn" id="tb-layers" title="Toggle map layers" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
          </svg>
          <span>Layers</span>
        </button>
        <div class="tb-popover" id="layers-popover" hidden>
          <div class="tb-popover-title">Map Layers</div>
          <label class="tb-layer-row">
            <input type="checkbox" id="toggle-flow" checked />
            <span>Flow lines</span>
          </label>
          <label class="tb-layer-row">
            <input type="checkbox" id="toggle-polygons" checked />
            <span>Polygons</span>
          </label>
        </div>
      </div>
      <div id="map"></div>
    </main>

    <!-- Right panel: charts -->
    <aside class="right-panel" id="right-panel">
      <div class="chart-section" id="bar-section">
        <div class="chart-section-header">
          <span class="chart-title" id="bar-title">Top 5 Destinations</span>
          <div class="chart-export-group">
            <button class="export-btn" id="export-bar-png" title="Download chart as PNG">PNG</button>
            <button class="export-btn" id="export-bar-csv" title="Download data as CSV">CSV</button>
          </div>
        </div>
        <div id="bar-chart" class="chart-canvas"></div>
      </div>
      <div class="chart-divider"></div>
      <div class="chart-section" id="sankey-section">
        <div class="chart-section-header">
          <span class="chart-title">Flow Distribution</span>
          <div class="chart-export-group">
            <button class="export-btn" id="export-sankey-png" title="Download chart as PNG">PNG</button>
            <button class="export-btn" id="export-sankey-csv" title="Download data as CSV">CSV</button>
          </div>
        </div>
        <div id="sankey-chart" class="chart-canvas"></div>
      </div>
    </aside>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
